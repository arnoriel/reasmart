<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport & theme ──────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#437266" />
    <meta name="background-color" content="#FAF7F2" />

    <!-- ── Favicons ──────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- ── PWA Manifest ───────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── iOS PWA meta tags ─────────────────────────────────────────────── -->
    <!-- Tells iOS Safari this can run as a standalone app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Reasmart" />

    <!-- ── Android / Chrome meta ─────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Reasmart" />

    <!-- ── SEO & social ──────────────────────────────────────────────────── -->
    <title>Reasmart – Mindful Reading</title>
    <meta name="description" content="AI-curated, deeply-researched articles that make you smarter — without the anxiety of doomscrolling." />
    <meta name="keywords" content="mindful reading, AI news, curated articles, finance literacy, smart reading" />
    <meta name="author" content="Reasmart" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Reasmart – Read Smarter. Think Clearer." />
    <meta property="og:description" content="AI-curated articles across finance, science, culture & more. No anxiety, no clickbait." />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Reasmart" />
    <meta name="twitter:description" content="Mindful AI reading. 40+ topics. 190+ countries." />
    <meta name="twitter:image" content="/icons/icon-192x192.png" />

    <!-- ── Splash screens for iOS (optional but polished) ────────────────── -->
    <!-- iPhone 14 Pro Max -->
    <link rel="apple-touch-startup-image"
      href="/icons/icon-512x512.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 / 13 / 12 -->
    <link rel="apple-touch-startup-image"
      href="/icons/icon-512x512.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone SE -->
    <link rel="apple-touch-startup-image"
      href="/icons/icon-192x192.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
